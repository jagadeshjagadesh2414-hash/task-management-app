<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input type="text" id="user" placeholder="Enter Username">

<button onclick="login()">Login</button>

<script>
function login(){

 let user=document.getElementById("user").value;

 localStorage.setItem("user",user);

 window.location.href="index.html";
}
</script>

</body>
</html>
